<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Person body -->
  <!-- Head -->
  <circle cx="148" cy="90" r="48" fill="#264653"/>
  <circle cx="148" cy="90" r="40" fill="#FFD4B8"/>
  <!-- Hair -->
  <path d="M 108 80 Q 108 42 148 42 Q 188 42 188 80 L 188 68 Q 188 38 148 38 Q 108 38 108 68 Z" fill="#264653"/>
  <!-- Eyes (worried) -->
  <ellipse cx="135" cy="86" rx="5" ry="6" fill="#264653"/>
  <ellipse cx="161" cy="86" rx="5" ry="6" fill="#264653"/>
  <!-- Worried mouth -->
  <path d="M 135 108 Q 148 102 161 108" stroke="#264653" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Sweat drop -->
  <path d="M 175 70 Q 178 62 182 70 Q 182 78 175 78 Z" fill="#88CCFF" opacity="0.8"/>

  <!-- Torso -->
  <path d="M 90 140 Q 80 145 75 180 L 75 280 Q 75 295 90 300 L 206 300 Q 221 295 221 280 L 221 180 Q 216 145 206 140 Z" fill="#264653"/>
  <!-- Shirt details -->
  <rect x="140" y="145" width="16" height="30" rx="3" fill="#3d6070"/>

  <!-- Arms -->
  <path d="M 90 155 Q 55 160 45 200 Q 40 225 55 235" stroke="#FFD4B8" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M 206 155 Q 241 160 251 200 Q 256 225 241 235" stroke="#FFD4B8" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <rect x="100" y="295" width="36" height="80" rx="14" fill="#264653"/>
  <rect x="160" y="295" width="36" height="80" rx="14" fill="#264653"/>
  <rect x="98" y="355" width="42" height="20" rx="8" fill="#1a3040"/>
  <rect x="158" y="355" width="42" height="20" rx="8" fill="#1a3040"/>

  <!-- Warning triangle (large, beside person) -->
  <polygon points="280,60 370,220 190,220" fill="#FF4DB8"/>
  <polygon points="280,75 357,210 203,210" fill="#FFE6F3"/>
  <!-- Exclamation -->
  <rect x="272" y="108" width="16" height="65" rx="6" fill="#FF4DB8"/>
  <circle cx="280" cy="192" r="10" fill="#FF4DB8"/>

  <!-- NG badge -->
  <circle cx="340" cy="295" r="45" fill="#E63946"/>
  <circle cx="340" cy="295" r="37" fill="white"/>
  <text x="340" y="305" font-family="Arial" font-size="26" fill="#E63946" text-anchor="middle" font-weight="bold">NG</text>
</svg>
