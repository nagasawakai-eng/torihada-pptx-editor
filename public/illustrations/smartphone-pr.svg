<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Phone body -->
  <rect x="105" y="30" width="190" height="340" rx="28" fill="#264653"/>
  <rect x="115" y="40" width="170" height="320" rx="20" fill="#3d6070"/>
  <!-- Screen -->
  <rect x="122" y="68" width="156" height="260" rx="10" fill="#FFFFFF"/>
  <!-- Notch -->
  <rect x="165" y="44" width="70" height="14" rx="7" fill="#1a3040"/>
  <!-- Home bar -->
  <rect x="165" y="348" width="70" height="6" rx="3" fill="#1a3040"/>

  <!-- App header bar (pink) -->
  <rect x="122" y="68" width="156" height="36" rx="10" fill="#FF4DB8"/>
  <rect x="122" y="86" width="156" height="18" fill="#FF4DB8"/>
  <circle cx="148" cy="86" r="11" fill="#FFE6F3"/>
  <text x="148" y="91" font-family="Arial" font-size="11" fill="#FF4DB8" text-anchor="middle" font-weight="bold">A</text>
  <text x="210" y="92" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">My Profile</text>

  <!-- Post card -->
  <rect x="130" y="112" width="140" height="100" rx="8" fill="#FFE6F3"/>
  <!-- PR badge -->
  <rect x="192" y="120" width="70" height="24" rx="6" fill="#FF4DB8"/>
  <text x="227" y="136" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold"># PR</text>
  <!-- Product image placeholder -->
  <rect x="138" y="148" width="48" height="48" rx="6" fill="#FFB3E0"/>
  <circle cx="162" cy="172" r="14" fill="#FF4DB8" opacity="0.5"/>
  <!-- Text lines -->
  <rect x="193" y="152" width="70" height="8" rx="4" fill="#CCCCCC"/>
  <rect x="193" y="166" width="55" height="8" rx="4" fill="#CCCCCC"/>
  <rect x="193" y="180" width="63" height="8" rx="4" fill="#CCCCCC"/>

  <!-- Reaction row -->
  <rect x="130" y="218" width="140" height="36" rx="6" fill="#F9F9F9"/>
  <text x="148" y="240" font-family="Arial" font-size="16" text-anchor="middle">❤️</text>
  <text x="175" y="240" font-family="Arial" font-size="16" text-anchor="middle">💬</text>
  <text x="202" y="240" font-family="Arial" font-size="16" text-anchor="middle">🔗</text>
  <rect x="218" y="228" width="44" height="20" rx="4" fill="#FF4DB8"/>
  <text x="240" y="241" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">投稿</text>

  <!-- Second post preview -->
  <rect x="130" y="262" width="140" height="52" rx="8" fill="#FFF0F5"/>
  <rect x="138" y="270" width="40" height="36" rx="4" fill="#FFB3E0"/>
  <rect x="186" y="274" width="76" height="7" rx="3" fill="#CCCCCC"/>
  <rect x="186" y="287" width="55" height="7" rx="3" fill="#CCCCCC"/>
  <rect x="186" y="300" width="66" height="7" rx="3" fill="#CCCCCC"/>
</svg>
