<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Base -->
  <rect x="140" y="330" width="120" height="22" rx="8" fill="#264653"/>
  <rect x="155" y="312" width="90" height="22" rx="5" fill="#3d6070"/>

  <!-- Trophy stem -->
  <rect x="182" y="270" width="36" height="46" rx="6" fill="#FF4DB8"/>

  <!-- Trophy cup body -->
  <path d="M 120 80 L 120 220 Q 120 260 200 270 Q 280 260 280 220 L 280 80 Z" fill="#FF4DB8"/>
  <!-- Cup shine -->
  <path d="M 138 90 L 138 200 Q 138 228 168 240" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Cup handles -->
  <path d="M 120 120 Q 72 120 72 165 Q 72 210 120 210" stroke="#264653" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M 280 120 Q 328 120 328 165 Q 328 210 280 210" stroke="#264653" stroke-width="20" fill="none" stroke-linecap="round"/>

  <!-- Star in cup -->
  <polygon points="200,110 212,145 250,145 220,166 230,202 200,180 170,202 180,166 150,145 188,145" fill="white"/>

  <!-- Certified ribbon -->
  <path d="M 160 50 L 200 30 L 240 50 L 235 88 L 200 75 L 165 88 Z" fill="#264653"/>
  <path d="M 165 53 L 200 36 L 235 53 L 231 84 L 200 72 L 169 84 Z" fill="#FFE6F3"/>
  <text x="200" y="70" font-family="Arial" font-size="16" fill="#FF4DB8" text-anchor="middle" font-weight="bold">✓</text>

  <!-- Sparkles -->
  <text x="75" y="95" font-family="Arial" font-size="20" fill="#FFB3E0">✦</text>
  <text x="308" y="105" font-family="Arial" font-size="16" fill="#FFB3E0">✦</text>
  <text x="90" y="290" font-family="Arial" font-size="14" fill="#FF4DB8" opacity="0.6">✦</text>
</svg>
